name: Viral Sach - Daily Auto Shorts

on:
  schedule:
    # IST = UTC + 5:30
    # Post 1: Roz 12:30 PM IST = 07:00 UTC (lunch break - peak India)
    - cron: '0 7 * * *'
    # Post 2: Roz 8:00 PM IST = 14:30 UTC (evening peak - max views India)
    - cron: '30 14 * * *'
    # Post 3: Tue + Fri 3:00 PM IST = 09:30 UTC (best days bonus post)
    - cron: '30 9 * * 2,5'

  workflow_dispatch:
    inputs:
      bot_type:
        description: 'Kaunsa bot chalao?'
        required: true
        default: 'meme'
        type: choice
        options:
          - meme
          - pexels
          - both
      creator:
        description: 'Creator (sourav/amit/carry/round2hell/triggered/ashish/bhuvan)'
        required: false
        default: 'sourav'

jobs:
  post-short:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg imagemagick fonts-liberation \
            libmagickwand-dev python3-numpy
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/' \
            /etc/ImageMagick-6/policy.xml || true
          echo "FFmpeg: $(ffmpeg -version | head -1)"

      - name: Install Python packages
        run: |
          pip install -q yt-dlp moviepy==1.0.3 requests schedule \
            google-api-python-client google-auth-oauthlib \
            Pillow numpy decorator tqdm proglog imageio imageio-ffmpeg

      - name: Create folders
        run: |
          mkdir -p pexels_clips final_videos shorts_output source_videos music

      - name: Restore YouTube credentials
        run: |
          if [ -n "${{ secrets.YOUTUBE_TOKEN }}" ]; then
            echo "${{ secrets.YOUTUBE_TOKEN }}" | base64 -d > token.pickle
            echo "[OK] YouTube token restored"
          else
            echo "[WARN] YOUTUBE_TOKEN not set"
          fi
          if [ -n "${{ secrets.YOUTUBE_CLIENT_SECRETS }}" ]; then
            echo '${{ secrets.YOUTUBE_CLIENT_SECRETS }}' > client_secrets.json
            echo "[OK] client_secrets.json restored"
          else
            echo "[WARN] YOUTUBE_CLIENT_SECRETS not set"
          fi

      - name: Decide which bot to run
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "bot=${{ github.event.inputs.bot_type }}" >> $GITHUB_OUTPUT
            echo "creator=${{ github.event.inputs.creator }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          HOUR=$(date -u +%H)
          DAY=$(date +%u)

          # 07:00 UTC = 12:30 PM IST → meme bot
          # 14:30 UTC = 08:00 PM IST → pexels bot
          # 09:30 UTC Tue/Fri        → meme bot bonus

          CREATORS=(sourav amit carry round2hell triggered ashish bhuvan thugesh)
          IDX=$((($DAY - 1) % 8))
          CREATOR=${CREATORS[$IDX]}

          if [ "$HOUR" = "07" ] || [ "$HOUR" = "09" ]; then
            echo "bot=meme" >> $GITHUB_OUTPUT
            echo "creator=$CREATOR" >> $GITHUB_OUTPUT
            echo "Selected: meme bot with $CREATOR"
          else
            echo "bot=pexels" >> $GITHUB_OUTPUT
            echo "creator=" >> $GITHUB_OUTPUT
            echo "Selected: pexels bot"
          fi

      - name: Run MEME BOT
        if: steps.decide.outputs.bot == 'meme' || steps.decide.outputs.bot == 'both'
        env:
          CHANNEL_NAME:        "Viral Sach"
          FACEBOOK_PAGE_ID:    ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_TOKEN: ${{ secrets.FACEBOOK_PAGE_TOKEN }}
        run: |
          CREATOR="${{ steps.decide.outputs.creator }}"
          if [ -z "$CREATOR" ]; then CREATOR="sourav"; fi
          echo "Meme bot: $CREATOR"
          python meme_bot.py --channel "$CREATOR"

      - name: Run PEXELS BOT
        if: steps.decide.outputs.bot == 'pexels' || steps.decide.outputs.bot == 'both'
        env:
          PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}
          CHANNEL_NAME:        "Viral Sach"
          FACEBOOK_PAGE_ID:    ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_TOKEN: ${{ secrets.FACEBOOK_PAGE_TOKEN }}
        run: |
          python auto_viral.py --count 1

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs-${{ github.run_number }}
          path: |
            meme_log.json
            upload_log.json
          retention-days: 30

      - name: Show results
        if: always()
        run: |
          echo "========================================"
          echo "RESULTS:"
          echo "========================================"
          for f in meme_log.json upload_log.json; do
            if [ -f "$f" ]; then
              echo "--- $f ---"
              python3 -c "
          import json, sys
          logs = json.load(open('$f'))
          for l in logs[-2:]:
              print(f\"  Status  : {l.get('status','?')}\")
              print(f\"  YouTube : {l.get('youtube_url','--')}\")
              print(f\"  Facebook: {l.get('facebook_url','--')}\")
              print()
          "
            fi
          done